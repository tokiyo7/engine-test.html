<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GeoDash God Mode</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.11.1/ethers.umd.min.js"></script>
    <style>
        body { background: #05080f; color: #00f0ff; font-family: monospace; padding: 50px; text-align: center; }
        .box { background: #111; padding: 30px; border: 2px solid #00f0ff; border-radius: 10px; max-width: 400px; margin: auto; }
        input { padding: 10px; margin: 10px 0; width: 80%; text-align: center; font-weight: bold; background: #000; color: #ffd700; border: 1px solid #ffd700; }
        button { background: #ffd700; color: #000; padding: 15px 20px; font-weight: bold; cursor: pointer; border: none; margin: 10px; width: 80%; border-radius: 5px; }
        .danger { background: #ff3060; color: white; }
    </style>
</head>
<body>

    <div class="box">
        <h2>🕵️‍♂️ TOKIYO CHEAT PANEL</h2>
        <p style="color:#888; font-size:12px;">Only for Admin use. Do not share.</p>

        <label>Level Number to Fake:</label><br>
        <input type="number" id="lvlNumber" value="4" min="1" max="10">

        <button onclick="farmAttempt()">1. ADD FAKE ATTEMPT</button>
        <button class="danger" onclick="instantClear()">2. INSTANT LEVEL CLEAR</button>
        
        <p id="status" style="margin-top:20px; color:#00ff88; font-size:14px;"></p>
    </div>

    <script>
        const CONTRACT_ADDRESS = "0x0C2c9dd1001a8ee6e329d972D0Ba6546db92d6d7";
        const ABI = [
            "function startLevel(uint256 level) external",
            "function saveLevelClear(uint256 level, bool isDevilGame) external"
        ];

        async function getContract() {
            if (!window.ethereum) throw new Error("MetaMask not found!");
            await window.ethereum.request({ method: 'eth_requestAccounts' });
            const provider = new ethers.BrowserProvider(window.ethereum);
            const signer = await provider.getSigner();
            return new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
        }

        async function farmAttempt() {
            try {
                const level = document.getElementById('lvlNumber').value;
                document.getElementById('status').innerText = "⏳ Adding Attempt...";
                const contract = await getContract();
                const tx = await contract.startLevel(level);
                await tx.wait();
                document.getElementById('status').innerText = `✅ Attempt added for Level ${level}!`;
            } catch(e) {
                document.getElementById('status').innerText = "❌ Error: " + e.message;
            }
        }

        async function instantClear() {
            try {
                const level = document.getElementById('lvlNumber').value;
                document.getElementById('status').innerText = "⏳ Hacking Level...";
                const contract = await getContract();
                const tx = await contract.saveLevelClear(level, false); // false = Classic mode
                await tx.wait();
                document.getElementById('status').innerText = `🏆 BOOM! Level ${level} Cleared!`;
            } catch(e) {
                document.getElementById('status').innerText = "❌ Error: " + e.message;
            }
        }
    </script>
</body>
</html>
