<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GeoDash 3.0 — Admin Tools</title>
    
    <meta property="og:title" content="GeoDash 3.0 — The Boss Fight Update">
    <meta property="og:description" content="Geometry Dash on Arbitrum! Survive the Boss Fight!">
    <meta property="og:image" content="https://geodash-amber.vercel.app/preview.png">
    <meta name="fc:frame" content='{"version":"next","imageUrl":"https://geodash-amber.vercel.app/preview.png","button":{"title":"🎮 Play GeoDash 3.0","action":{"type":"launch_frame","name":"GeoDash","url":"https://geodash-amber.vercel.app","splashImageUrl":"https://geodash-amber.vercel.app/icon.png","splashBackgroundColor":"#05080f"}}}' />
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.11.1/ethers.umd.min.js"></script>
    <style>
        :root { 
            --bg-dark: #05080f; 
            --cyan: #00f0ff; 
            --red: #ff3060; 
            --gold: #ffd700; 
            --emerald: #00ff88; 
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', monospace; }
        
        body { 
            background-color: var(--bg-dark); 
            color: #fff; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
        }

        .admin-box {
            width: 100%;
            max-width: 500px;
            background: linear-gradient(135deg, rgba(10,15,24,0.95), rgba(5,8,15,0.98));
            border: 2px solid var(--cyan);
            border-radius: 16px;
            padding: 30px;
            margin-top: 50px;
            box-shadow: 0 0 30px rgba(0,240,255,0.15);
            text-align: center;
        }

        h2 { color: var(--gold); margin-bottom: 5px; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
        .subtitle { color: #888; font-size: 12px; margin-bottom: 25px; }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { color: var(--cyan); font-size: 14px; font-weight: bold; display: block; margin-bottom: 8px; }
        
        input, select { 
            width: 100%; 
            padding: 15px; 
            background: #000; 
            color: #fff; 
            border: 1px solid #333; 
            border-radius: 8px; 
            outline: none; 
            font-size: 16px; 
            font-weight: bold;
        }
        
        select { color: var(--cyan); cursor: pointer; }

        .btn { 
            width: 100%; 
            padding: 16px; 
            font-size: 16px; 
            font-weight: 900; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            margin-bottom: 15px; 
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .btn-farm { background: rgba(0,240,255,0.1); border: 2px solid var(--cyan); color: var(--cyan); }
        .btn-farm:hover { background: var(--cyan); color: #000; box-shadow: 0 0 15px var(--cyan); }

        .btn-clear { background: linear-gradient(90deg, var(--gold), #ff8c00); color: #000; }
        .btn-clear:hover { transform: scale(1.02); box-shadow: 0 0 20px var(--gold); }

        #statusBox {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: #111;
            border: 1px solid #333;
            font-size: 13px;
            color: #aaa;
            min-height: 50px;
            word-wrap: break-word;
        }

        .connected-wallet { color: var(--emerald); font-size: 12px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="admin-box">
        <h2>🕵️‍♂️ ON-CHAIN INJECTOR</h2>
        <div class="subtitle">GeoDash 3.0 Stealth Mode</div>
        
        <div class="connected-wallet" id="walletDisplay">🔴 Not Connected. Please open in MetaMask browser.</div>

        <div class="input-group">
            <label>1. Select Mode</label>
            <select id="gameMode">
                <option value="classic">🟦 Classic Mode (GeoDash)</option>
                <option value="devil">👿 Devil Mode (Hardcore)</option>
            </select>
        </div>

        <div class="input-group">
            <label>2. Target Level</label>
            <input type="number" id="targetLevel" value="6" min="1" max="10">
        </div>

        <button class="btn btn-farm" onclick="farmAttempt()">+ Add 1 Fake Attempt</button>
        <button class="btn btn-clear" onclick="instantClear()">⚡ Instant Level Clear</button>

        <div id="statusBox">System Ready. Awaiting commands...</div>
    </div>

    <script>
        const CONTRACT_ADDRESS = "0x0C2c9dd1001a8ee6e329d972D0Ba6546db92d6d7";
        const ABI = [
            "function startLevel(uint256 level) external",
            "function saveLevelClear(uint256 level, bool isDevilGame) external"
        ];

        let provider, signer, contract;

        function log(msg, color = "#aaa") {
            const sb = document.getElementById('statusBox');
            sb.innerHTML = `<span style="color:${color}">${msg}</span>`;
        }

        async function initWeb3() {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    await window.ethereum.request({ method: 'eth_requestAccounts' });
                    provider = new ethers.BrowserProvider(window.ethereum);
                    signer = await provider.getSigner();
                    contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
                    
                    const address = await signer.getAddress();
                    document.getElementById('walletDisplay').innerHTML = `🟢 Connected: ${address.slice(0,6)}...${address.slice(-4)}`;
                    
                    // Switch to Arbitrum if needed
                    try {
                        await window.ethereum.request({
                            method: 'wallet_switchEthereumChain',
                            params: [{ chainId: '0xa4b1' }], // Arbitrum One Chain ID
                        });
                    } catch (switchError) {
                        log("Please switch MetaMask to Arbitrum One network.", "#ff3060");
                    }
                } catch (e) {
                    log("Connection failed: " + e.message, "#ff3060");
                }
            } else {
                log("MetaMask not found! You must open this link in Chrome/Brave with MetaMask.", "#ff3060");
            }
        }

        async function farmAttempt() {
            if (!contract) { log("Connecting wallet...", "#ffd700"); await initWeb3(); if(!contract) return; }
            
            const level = document.getElementById('targetLevel').value;
            log(`Requesting signature to add attempt for Level ${level}...`, "#00f0ff");
            
            try {
                const tx = await contract.startLevel(level);
                log(`Mining transaction... (Hash: ${tx.hash.slice(0,10)}...)`, "#ffd700");
                await tx.wait();
                log(`✅ Attempt successfully added to Level ${level}!`, "#00ff88");
            } catch (e) {
                log("❌ Error: " + (e.reason || e.message).slice(0, 50), "#ff3060");
            }
        }

        async function instantClear() {
            if (!contract) { log("Connecting wallet...", "#ffd700"); await initWeb3(); if(!contract) return; }
            
            const level = document.getElementById('targetLevel').value;
            const mode = document.getElementById('gameMode').value;
            const isDevil = mode === 'devil';
            
            log(`Requesting signature to CLEAR Level ${level} (${mode} mode)...`, "#00f0ff");
            
            try {
                const tx = await contract.saveLevelClear(level, isDevil);
                log(`Mining victory... (Hash: ${tx.hash.slice(0,10)}...)`, "#ffd700");
                await tx.wait();
                log(`🏆 BOOM! Level ${level} Cleared on-chain! Check Leaderboard!`, "#00ff88");
            } catch (e) {
                log("❌ Error: " + (e.reason || e.message).slice(0, 50), "#ff3060");
            }
        }

        // Auto-init on load
        window.addEventListener('load', initWeb3);
    </script>
</body>
</html>
